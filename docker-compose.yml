services:
  # ── Mock API (backend) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      PORT: 4000
    restart: unless-stopped

  # ── React App (frontend) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:${API_PORT:-4000}
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
